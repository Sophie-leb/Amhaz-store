<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>

<header>
  <h1>📱 My Phone Store</h1>
  <nav>
    <a href="#">Home</a>

    <a href="#">Contact</a>
  </nav>

<section class="hero">
  <h2>Best Phones in Lebanon</h2>

  <div class="card">

    <p>$899</p>
    <button onclick="buy('Samsung S24')">Buy Now</button>

  <div class="card">
    <img src="https://via.placeholder.com/200" />

    <p>$199</p>
    <button onclick="buy('AirPods Pro')">Buy Now</button>
  </div>

</section>

<footer>
  <p>© 2026 My Phone Store - Lebanon</p>
</footer>

<script src="script.js"></script>

</html>
