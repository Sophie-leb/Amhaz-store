<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Store Lebanon</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
    color: #111;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
    border-bottom: 1px solid #eee;
    position: sticky;
    top: 0;
    background: white;
}

.logo {
    font-weight: bold;
    font-size: 18px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 40px 20px;
}

.hero h1 {
    font-size: 28px;
}

.hero p {
    color: gray;
}

/* PRODUCTS */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    border: 1px solid #eee;
    border-radius: 10px;
    overflow: hidden;
    background: white;
}

.card img {
    width: 100%;
}

.card-content {
    padding: 10px;
}

.price {
    font-weight: bold;
}

/* BUTTON */
.btn {
    display: block;
    background: black;
    color: white;
    text-align: center;
    padding: 10px;
    margin-top: 10px;
    text-decoration: none;
    border-radius: 5px;
}

/* SECTION */
.section {
    padding: 30px 20px;
    text-align: center;
}

.footer {
    text-align: center;
    padding: 20px;
    color: gray;
}
</style>
</head>

<body>

<header>
    <div class="logo">📱 YourStore</div>
    <div>Lebanon 🇱🇧</div>
</header>

<div class="hero">
    <h1>Premium Phones</h1>
    <p>Best prices in Lebanon - Cash on delivery</p>
</div>

<div class="grid">

    <div class="card">
        <img src="https://via.placeholder.com/300x300">
        <div class="card-content">
            <h3>iPhone 13</h3>
            <p class="price">$600</p>
            <a class="btn" href="https://wa.me/96170123456?text=I want iPhone 13">Order Now</a>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x300">
        <div class="card-content">
            <h3>Samsung S22</h3>
            <p class="price">$500</p>
            <a class="btn" href="https://wa.me/96170123456?text=I want Samsung S22">Order Now</a>
        </div>
    </div>

</div>

<div class="section">
    <h2>Why choose us?</h2>
    <p>✔ Original phones<br>✔ Fast delivery<br>✔ Best prices</p>
</div>

<div class="section">
    <h2>Contact Us</h2>
    <p>WhatsApp: +961 XXXXXXXX</p>
    <p>Instagram: @yourstore</p>
</div>

<div class="footer">
    © 2026 YourStore Lebanon
</div>

</body>
</html>
